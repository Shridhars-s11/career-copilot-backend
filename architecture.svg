<svg width="700" height="580" viewBox="0 0 700 580" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <rect width="700" height="580" fill="#0F1420"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#8B92A8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Row 1: Frontend -> FastAPI -> Orchestrator -->
  <g>
    <rect x="40" y="40" width="150" height="56" rx="8" fill="#171E2E" stroke="#2A3350"/>
    <text x="115" y="63" text-anchor="middle" fill="#E8E6DF" font-size="13" font-weight="600">Frontend</text>
    <text x="115" y="81" text-anchor="middle" fill="#8B92A8" font-size="10">React + Tailwind</text>
  </g>
  <line x1="190" y1="68" x2="230" y2="68" stroke="#8B92A8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="230" y="40" width="150" height="56" rx="8" fill="#171E2E" stroke="#2A3350"/>
    <text x="305" y="63" text-anchor="middle" fill="#E8E6DF" font-size="13" font-weight="600">FastAPI</text>
    <text x="305" y="81" text-anchor="middle" fill="#8B92A8" font-size="10">REST endpoints</text>
  </g>
  <line x1="380" y1="68" x2="420" y2="68" stroke="#8B92A8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="420" y="40" width="200" height="56" rx="8" fill="#171E2E" stroke="#D9A441" stroke-width="1.5"/>
    <text x="520" y="63" text-anchor="middle" fill="#E8E6DF" font-size="13" font-weight="600">Orchestrator</text>
    <text x="520" y="81" text-anchor="middle" fill="#8B92A8" font-size="10">LangGraph supervisor</text>
  </g>

  <!-- fan-out arrows to agents -->
  <line x1="500" y1="96" x2="125" y2="170" stroke="#8B92A8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="520" y1="96" x2="335" y2="170" stroke="#8B92A8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="545" y1="96" x2="545" y2="170" stroke="#8B92A8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Row 2: agents -->
  <g>
    <rect x="40" y="170" width="170" height="56" rx="8" fill="#171E2E" stroke="#2A3350"/>
    <text x="125" y="193" text-anchor="middle" fill="#E8E6DF" font-size="13" font-weight="600">Job Finder</text>
    <text x="125" y="211" text-anchor="middle" fill="#8B92A8" font-size="10">Adzuna + JSearch, hybrid rank</text>
  </g>

  <line x1="210" y1="198" x2="250" y2="198" stroke="#4FA3A3" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="230" y="192" text-anchor="middle" fill="#4FA3A3" font-size="9">on demand</text>

  <g>
    <rect x="250" y="170" width="170" height="56" rx="8" fill="#171E2E" stroke="#2A3350"/>
    <text x="335" y="193" text-anchor="middle" fill="#E8E6DF" font-size="13" font-weight="600">Resume Tailor</text>
    <text x="335" y="211" text-anchor="middle" fill="#8B92A8" font-size="10">Honest reframing, no fabrication</text>
  </g>

  <g>
    <rect x="460" y="170" width="170" height="56" rx="8" fill="#171E2E" stroke="#2A3350"/>
    <text x="545" y="193" text-anchor="middle" fill="#E8E6DF" font-size="13" font-weight="600">Interview Coach</text>
    <text x="545" y="211" text-anchor="middle" fill="#8B92A8" font-size="10">Question + scored feedback</text>
  </g>

  <!-- down arrows to row 3 -->
  <line x1="160" y1="226" x2="200" y2="300" stroke="#8B92A8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="300" y1="226" x2="290" y2="300" stroke="#8B92A8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="545" y1="226" x2="545" y2="300" stroke="#8B92A8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Row 3: Guardrail Gate + Performance Analyst -->
  <g>
    <rect x="100" y="300" width="260" height="56" rx="8" fill="#171E2E" stroke="#D9A441" stroke-width="1.5"/>
    <text x="230" y="323" text-anchor="middle" fill="#E8E6DF" font-size="13" font-weight="600">Guardrail Gate</text>
    <text x="230" y="341" text-anchor="middle" fill="#8B92A8" font-size="10">Blocks fabrication + prompt injection</text>
  </g>

  <g>
    <rect x="460" y="300" width="170" height="56" rx="8" fill="#171E2E" stroke="#2A3350"/>
    <text x="545" y="323" text-anchor="middle" fill="#E8E6DF" font-size="13" font-weight="600">Performance Analyst</text>
    <text x="545" y="341" text-anchor="middle" fill="#8B92A8" font-size="10">Score trends over time</text>
  </g>

  <!-- down arrow to human approval -->
  <line x1="230" y1="356" x2="230" y2="430" stroke="#8B92A8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Row 4: Human Approval -->
  <g>
    <rect x="130" y="430" width="200" height="56" rx="8" fill="#171E2E" stroke="#4FA3A3" stroke-width="1.5"/>
    <text x="230" y="453" text-anchor="middle" fill="#E8E6DF" font-size="13" font-weight="600">Human Approval</text>
    <text x="230" y="471" text-anchor="middle" fill="#8B92A8" font-size="10">interrupt() pauses for your decision</text>
  </g>

  <!-- caption + legend -->
  <text x="350" y="530" text-anchor="middle" fill="#8B92A8" font-size="11">
    Shared state: Postgres + pgvector (resumes, jobs, applications, interview sessions, scores)
  </text>
  <text x="350" y="556" text-anchor="middle" fill="#8B92A8" font-size="10">
    Gold border = automated guardrail check &#183; Teal border = human decision point
  </text>
</svg>
